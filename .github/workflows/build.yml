name: Build & Release

# Builds the plugin on every push to main and, when the version in pom.xml has
# been bumped (a matching tag doesn't exist yet), publishes a GitHub Release
# with the jar attached. Commits that don't change the version just build and
# upload a throwaway artifact (Actions tab), so nothing is released twice.
#
# No native toolchain / ffmpeg needed: the mcmm binary is committed under
# src/main/resources/natives/, so `mvn package` alone produces a working jar.

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}   # lets you trigger a build by hand from the Actions tab

permissions:
  contents: write         # required for the GITHUB_TOKEN to create releases/tags

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Read the project version from pom.xml
        id: version
        run: |
          version=$(grep -m1 -oP '<version>\K[0-9]+\.[0-9]+\.[0-9]+' pom.xml)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Project version: $version"

      # Always keep the built jar downloadable from the Actions run (90 days),
      # even on commits that don't bump the version.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: minecraftvideo-plugin-${{ steps.version.outputs.version }}
          path: target/minecraftvideo-plugin-*.jar
          if-no-files-found: error

      # Publish a Release only when this version hasn't been released yet, so a
      # release appears exactly once per version bump (via ./build.sh).
      - name: Check whether this version is already released
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.version.outputs.version }} already exists — skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create the release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            "target/minecraftvideo-plugin-${{ steps.version.outputs.version }}.jar" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
