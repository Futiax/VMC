name: MinecraftVideo
main: ovh.futiax.minecraftvideo.MinecraftVideoPlugin
# Filled from pom.xml at build time (Maven resource filtering); bump via ./build.sh
version: ${project.version}
api-version: "1.21"
description: Plays videos on virtual in-game map screens (packets only).
author: Futiax
depend: [packetevents]
softdepend: [voicechat]

commands:
  video:
    description: Play a video on a virtual map screen.
    usage: /video option <w> <h> [fps] | /video option audio <mono|stereo|surround> | /video play <url-or-path> [w] [h] [fps] | /video seek <+s|-s|[hh:]mm:ss> | /video stop | pause | resume | status
    permission: minecraftvideo.use

permissions:
  minecraftvideo.use:
    description: Allows using the /video command.
    default: op
