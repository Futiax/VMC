# Path to the native mcmm converter executable.
# Leave EMPTY to use the binary bundled with the plugin (extracted into this
# folder on first start). Set a path to override with your own build.
mcmm-path: ""

# Path to the palette JSON passed to mcmm via --palette. Leave EMPTY to use the
# bundled VANILLA map-color palette (works on any client, no mod needed). Only
# override this on a modded (Fabric/NeoForge) server that uses a custom map
# palette such as Improved Map Colors.
palette-path: ""

# Default screen size in maps (each map is 128x128 pixels) and default fps,
# used when /video play is called without explicit [w] [h] [fps] arguments.
default-width: 4
default-height: 3
default-fps: 10

# Clickable control bar floating under the screen (packet-only entities, like
# the screen itself): rewind 10s / play-pause / forward 10s / skip to the next
# queued video. Only players with the minecraftvideo.use permission can click
# the buttons; everyone sees them. Applies to the next /video play.
control-bar-enabled: true

# --- Subtitle overlay geometry (also settable in-game: /video option sub ...) ---
#   size   = text scale (bigger = larger glyphs)
#   height = blocks above the screen's bottom edge (raises the text; negative
#            lowers it below the edge; a control bar, if present, adds its own
#            clearance above this automatically)
#   depth  = blocks in front of the screen surface (0 = on the plane; a small
#            value avoids z-fighting; negative places it behind the plane)
# Applies to the next /video play.
subtitle-size: 1.0
subtitle-height: 0.45
subtitle-depth: 0.05

# --- Remote source cache ---
# Download an http(s) source to a local file (plugins/MinecraftVideo/cache)
# ONCE, so mcmm, the audio ffmpeg, ffprobe and the subtitle ffmpeg all read the
# local file instead of each opening its own connection to the origin. This
# avoids the concurrent-connection load that makes hosts like archive.org answer
# "5XX Server Error", and means a seek or a subtitle toggle never re-fetches.
# The file is kept while the URL is still queued or playing and removed once its
# last occurrence ends; the whole cache is wiped on server stop. Local file
# paths are always played directly (never cached).
cache-remote-sources: true

# Hard size cap: a remote source larger than this is REFUSED (a clear message,
# not a silent stream). In megabytes.
# For safety the download refuses non-public targets (loopback, link-local incl.
# cloud metadata, private/CGNAT/ULA ranges), re-validated across redirects.
cache-max-size-mb: 2048

# --- Audio (requires the Simple Voice Chat mod on the server and clients) ---
# When enabled, the video's audio is streamed into a spatialised Simple Voice
# Chat channel anchored at the screen. If SVC is absent, videos play silently.
audio-enabled: true

# Audio channel layout:
#   mono     — one channel at the screen center.
#   stereo   — two channels anchored to the screen's left/right edges, so the
#              client pans L/R from the viewer's own position (a fixed "cinema"
#              image). Costs ~2x audio bandwidth.
#   surround — 5.1 decode mapped onto 6 speakers: front L/R at the screen
#              edges, center at the screen center, a SUBWOOFER (the LFE
#              channel, +6 dB) at the base of the screen, rear L/R behind the
#              audience. A 5.1+ source (or Atmos bed) maps directly; a
#              mono/stereo source gets a REAL upmix (center/rears/LFE are
#              synthesized), so every speaker plays. Costs ~6x audio bandwidth.
# Change in-game with /video option audio <mono|stereo|surround>.
audio-mode: "mono"

# How many blocks behind the screen plane (toward the audience) the surround
# rear speakers sit. Only used with audio-mode: surround.
surround-rear-distance: 10

# --- A/V sync ---
# The first video frame is sent immediately and FROZEN for
# audio-start-delay-ms: the client absorbs the render spike of the screen
# appearing while the picture is static, so its audio jitter buffer never
# inflates. Then video pacing and audio start together; no content is lost to
# the warm-up.
#
# av-sync-delay-ms estimates the client-side audio buffering; that much audio
# content is SKIPPED so the sound lands on the picture:
#   sound arrives LATE (after the picture)  -> INCREASE it
#   sound arrives EARLY (before the picture) -> DECREASE it (or set 0)
av-sync-delay-ms: 200
audio-start-delay-ms: 1000

# Path to the ffmpeg executable used to decode the audio track (must be in PATH
# or an absolute path). ffmpeg reads local files and URLs alike.
ffmpeg-path: "ffmpeg"

# Audio falloff distance in blocks (how far the screen's sound carries).
audio-distance: 48
